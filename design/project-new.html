<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .headline-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom Scrollbar for the form */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #a4b0de;
            border-radius: 10px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#98b0ff",
                        "tertiary-container": "#7df2c8",
                        "primary": "#3f5baa",
                        "surface-tint": "#3f5baa",
                        "secondary-fixed": "#ccfbeb",
                        "on-surface": "#243157",
                        "on-surface-variant": "#515e86",
                        "on-secondary-fixed-variant": "#426c60",
                        "error": "#ac3434",
                        "surface-bright": "#faf8ff",
                        "surface-dim": "#cfd9ff",
                        "on-error": "#fff7f6",
                        "on-secondary-fixed": "#244f44",
                        "on-secondary-container": "#376256",
                        "on-primary-fixed-variant": "#22408f",
                        "on-primary-fixed": "#002266",
                        "tertiary-fixed": "#7df2c8",
                        "surface-container-low": "#f2f3ff",
                        "on-tertiary-fixed-variant": "#00644c",
                        "on-primary": "#faf8ff",
                        "inverse-on-surface": "#969cb5",
                        "primary-fixed": "#acbfff",
                        "tertiary-dim": "#005f47",
                        "surface-container-lowest": "#ffffff",
                        "background": "#faf8ff",
                        "inverse-surface": "#070d20",
                        "secondary-fixed-dim": "#beecdd",
                        "on-primary-container": "#163785",
                        "secondary": "#3c675b",
                        "on-error-container": "#65000b",
                        "on-secondary": "#e4fff4",
                        "on-tertiary": "#e5fff2",
                        "surface-variant": "#dbe1ff",
                        "secondary-container": "#ccfbeb",
                        "inverse-primary": "#809aef",
                        "on-tertiary-fixed": "#004533",
                        "tertiary-fixed-dim": "#6ee4bb",
                        "surface-container-highest": "#dbe1ff",
                        "primary-dim": "#324f9d",
                        "tertiary": "#006c52",
                        "surface": "#faf8ff",
                        "outline": "#6d79a4",
                        "error-dim": "#70030f",
                        "secondary-dim": "#305b4f",
                        "on-background": "#243157",
                        "on-tertiary-container": "#005a43",
                        "error-container": "#f56965",
                        "outline-variant": "#a4b0de",
                        "surface-container": "#ebedff",
                        "surface-container-high": "#e3e7ff",
                        "primary-container": "#acbfff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sidebar-width": "260px",
                        "sm": "8px",
                        "base": "4px",
                        "container-padding": "32px",
                        "xs": "4px",
                        "xl": "48px",
                        "md": "16px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "display": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex overflow-hidden">
<!-- Left Sidebar (Desktop Only) -->
<aside class="w-[260px] bg-surface-container-low border-r border-outline-variant h-screen flex flex-col shrink-0">
<div class="px-lg h-16 flex items-center">
<span class="font-headline-lg text-headline-lg font-bold text-primary">프로젝트 비서</span>
</div>
<nav class="flex-1 px-sm py-md space-y-base">
<a class="flex items-center gap-md px-md py-sm rounded-xl text-on-surface-variant hover:bg-surface-container-highest transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-md text-label-md">홈</span>
</a>
<a class="flex items-center gap-md px-md py-sm rounded-xl text-on-surface-variant hover:bg-surface-container-highest transition-colors" href="#">
<span class="material-symbols-outlined">event_busy</span>
<span class="font-label-md text-label-md">마감 기한</span>
</a>
<a class="flex items-center gap-md px-md py-sm rounded-xl text-on-surface-variant hover:bg-surface-container-highest transition-colors" href="#">
<span class="material-symbols-outlined">calendar_month</span>
<span class="font-label-md text-label-md">캘린더</span>
</a>
<!-- Active State -->
<a class="flex items-center gap-md px-md py-sm rounded-xl bg-primary-container text-on-primary-container transition-colors" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-md text-label-md">새 프로젝트</span>
</a>
</nav>
<div class="p-lg border-t border-outline-variant">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-primary-fixed-dim flex items-center justify-center text-on-primary-fixed">
<span class="material-symbols-outlined">person</span>
</div>
<div>
<p class="text-label-md font-bold text-on-surface">김지수 팀장</p>
<p class="text-[10px] text-on-surface-variant">디자인 본부</p>
</div>
</div>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col h-screen overflow-hidden">
<!-- Top App Bar (Contextual) -->
<header class="h-16 flex items-center justify-between px-container-padding bg-surface border-b border-outline-variant shrink-0">
<div class="flex items-center gap-md">
<h1 class="font-headline-lg text-headline-lg text-on-surface">새 프로젝트 등록</h1>
</div>
<div class="flex items-center gap-md">
<button class="w-10 h-10 rounded-full hover:bg-surface-container-high flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="w-10 h-10 rounded-full hover:bg-surface-container-high flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Form Scrollable Area -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-container-padding">
<div class="max-w-[1000px] mx-auto space-y-lg pb-xl">
<!-- Section 1: 기본 정보 -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-[24px] p-lg">
<div class="flex items-center gap-sm mb-lg">
<span class="material-symbols-outlined text-primary">info</span>
<h2 class="font-headline-md text-headline-md text-on-surface">기본 정보</h2>
</div>
<div class="grid grid-cols-2 gap-lg">
<!-- Full Width Name -->
<div class="col-span-2">
<label class="block text-label-md font-medium text-on-surface-variant mb-xs">프로젝트 명</label>
<input class="w-full h-12 bg-surface-container-low border-none rounded-lg px-md focus:ring-2 focus:ring-primary transition-shadow placeholder:text-outline" placeholder="예: 2024 상반기 브랜드 리뉴얼" type="text"/>
</div>
<!-- Type & Partner -->
<div class="col-span-1">
<label class="block text-label-md font-medium text-on-surface-variant mb-xs">프로젝트 유형</label>
<div class="relative">
<select class="w-full h-12 bg-surface-container-low border-none rounded-lg px-md appearance-none focus:ring-2 focus:ring-primary">
<option>UI/UX 디자인</option>
<option>브랜딩</option>
<option>마케팅 캠페인</option>
<option>콘텐츠 기획</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<div class="col-span-1">
<label class="block text-label-md font-medium text-on-surface-variant mb-xs">협력 파트너</label>
<input class="w-full h-12 bg-surface-container-low border-none rounded-lg px-md focus:ring-2 focus:ring-primary transition-shadow" placeholder="파트너사 또는 담당자 입력" type="text"/>
</div>
<!-- Period -->
<div class="col-span-1">
<label class="block text-label-md font-medium text-on-surface-variant mb-xs">시작일</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container-low border-none rounded-lg px-md focus:ring-2 focus:ring-primary" type="date"/>
</div>
</div>
<div class="col-span-1">
<label class="block text-label-md font-medium text-on-surface-variant mb-xs">종료일</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container-low border-none rounded-lg px-md focus:ring-2 focus:ring-primary" type="date"/>
</div>
</div>
<!-- Requirements -->
<div class="col-span-2">
<label class="block text-label-md font-medium text-on-surface-variant mb-xs">주요 요구사항 및 목표</label>
<textarea class="w-full bg-surface-container-low border-none rounded-lg p-md focus:ring-2 focus:ring-primary transition-shadow resize-none" placeholder="프로젝트의 주요 목표와 핵심 요구사항을 입력하세요." rows="4"></textarea>
</div>
</div>
</section>
<!-- Section 2: 관련 문서 -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-[24px] p-lg">
<div class="flex items-center gap-sm mb-lg">
<span class="material-symbols-outlined text-primary">link</span>
<h2 class="font-headline-md text-headline-md text-on-surface">관련 문서</h2>
</div>
<div class="space-y-md">
<div class="flex gap-md">
<input class="flex-1 h-12 bg-surface-container-low border-none rounded-lg px-md focus:ring-2 focus:ring-primary" placeholder="참조 링크 (URL)" type="text"/>
<button class="h-12 px-lg bg-surface-container-high text-primary font-medium rounded-lg hover:bg-surface-variant transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined text-[20px]">add</span>
                                링크 추가
                            </button>
</div>
<div class="border-2 border-dashed border-outline-variant rounded-[16px] p-xl flex flex-col items-center justify-center text-center hover:bg-surface-container-low transition-colors cursor-pointer">
<span class="material-symbols-outlined text-[48px] text-outline mb-md">cloud_upload</span>
<p class="text-body-lg font-medium text-on-surface mb-xs">이곳에 파일을 드래그하여 업로드하세요</p>
<p class="text-label-md text-on-surface-variant">PDF, DOCX, JPG (최대 20MB)</p>
</div>
</div>
</section>
<!-- Section 3: 진행 단계 설정 -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-[24px] p-lg">
<div class="flex items-center justify-between mb-lg">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">analytics</span>
<h2 class="font-headline-md text-headline-md text-on-surface">진행 단계 설정</h2>
</div>
<button class="h-10 px-md bg-secondary-container text-on-secondary-container rounded-full flex items-center gap-xs hover:scale-105 active:scale-95 transition-all text-label-md font-bold">
<span class="material-symbols-outlined text-[20px]">add_circle</span>
                            단계 추가
                        </button>
</div>
<div class="space-y-md" id="stage-list">
<!-- Stage Item -->
<div class="flex items-center gap-md p-md bg-surface-container-low rounded-xl group border border-transparent hover:border-outline-variant transition-all">
<div class="w-8 h-8 rounded-full bg-primary-fixed text-on-primary-fixed flex items-center justify-center font-bold text-label-md">1</div>
<div class="flex-1 grid grid-cols-2 gap-md">
<input class="bg-transparent border-none focus:ring-0 font-medium text-on-surface p-0" type="text" value="착수 및 기획"/>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">event</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface-variant text-label-md p-0" type="date"/>
</div>
</div>
<button class="opacity-0 group-hover:opacity-100 p-sm text-error hover:bg-error-container/10 rounded-full transition-all">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Stage Item -->
<div class="flex items-center gap-md p-md bg-surface-container-low rounded-xl group border border-transparent hover:border-outline-variant transition-all">
<div class="w-8 h-8 rounded-full bg-primary-fixed text-on-primary-fixed flex items-center justify-center font-bold text-label-md">2</div>
<div class="flex-1 grid grid-cols-2 gap-md">
<input class="bg-transparent border-none focus:ring-0 font-medium text-on-surface p-0" type="text" value="디자인 개발"/>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">event</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface-variant text-label-md p-0" type="date"/>
</div>
</div>
<button class="opacity-0 group-hover:opacity-100 p-sm text-error hover:bg-error-container/10 rounded-full transition-all">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
</section>
</div>
</div>
<!-- Footer Actions -->
<footer class="h-20 bg-surface-container-lowest border-t border-outline-variant px-container-padding flex items-center justify-between shrink-0">
<button class="px-lg h-12 rounded-xl text-primary font-bold hover:bg-surface-container-high transition-colors">
                임시 저장
            </button>
<div class="flex gap-md">
<button class="px-xl h-12 bg-primary text-on-primary font-bold rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all">
                    프로젝트 등록하기
                </button>
</div>
</footer>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const addStageBtn = document.querySelector('button:contains("단계 추가")'); // Note: selector is illustrative
            // Simple interaction for buttons
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Visual feedback
                    const ripple = document.createElement('span');
                    ripple.classList.add('absolute', 'inset-0', 'bg-white/20', 'rounded-inherit', 'animate-ping');
                    btn.style.position = 'relative';
                    btn.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 400);
                });
            });
        });

        // Add stage functionality
        const stageList = document.getElementById('stage-list');
        const addBtn = document.querySelector('.bg-secondary-container');
        
        addBtn.addEventListener('click', () => {
            const count = stageList.children.length + 1;
            const newStage = document.createElement('div');
            newStage.className = "flex items-center gap-md p-md bg-surface-container-low rounded-xl group border border-transparent hover:border-outline-variant transition-all animate-in fade-in slide-in-from-top-2 duration-300";
            newStage.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-primary-fixed text-on-primary-fixed flex items-center justify-center font-bold text-label-md">${count}</div>
                <div class="flex-1 grid grid-cols-2 gap-md">
                    <input type="text" placeholder="새 단계 이름" class="bg-transparent border-none focus:ring-0 font-medium text-on-surface p-0">
                    <div class="flex items-center gap-sm">
                        <span class="material-symbols-outlined text-on-surface-variant text-[20px]">event</span>
                        <input type="date" class="bg-transparent border-none focus:ring-0 text-on-surface-variant text-label-md p-0">
                    </div>
                </div>
                <button class="opacity-0 group-hover:opacity-100 p-sm text-error hover:bg-error-container/10 rounded-full transition-all" onclick="this.parentElement.remove()">
                    <span class="material-symbols-outlined">delete</span>
                </button>
            `;
            stageList.appendChild(newStage);
        });
    </script>
</body></html>
